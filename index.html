<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiew Kai Ka - Songkarn 26 Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        
        .section-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #f3f4f6;
        }

        .rating-star { cursor: pointer; transition: transform 0.2s, color 0.2s; }
        .rating-star:hover { transform: scale(1.2); }
        .rating-star.active { color: #f59e0b; }
        
        .choice-btn { transition: all 0.2s ease; border: 1px solid #e5e7eb; }
        .choice-btn.selected {
            background-color: #16a34a;
            color: white;
            border-color: #16a34a;
            box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.3);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] text-gray-800">

    <div class="max-w-2xl mx-auto">
        
        <div class="text-center mb-8 bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-600">
            <h1 class="text-3xl font-bold text-green-800 mb-2">Food Feedback</h1>
            <p class="text-gray-500">มื้อพิเศษจากร้าน "เขียวไข่กา แจ้งวัฒนะ"</p>
        </div>

        <form id="feedbackForm">
            
            <div class="section-card">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-user text-green-600 mr-2"></i>ข้อมูลพนักงาน</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
                        <input type="text" id="employeeName" required 
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" 
                            placeholder="ระบุชื่อของคุณ">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">แผนก <span class="text-red-500">*</span></label>
                        <select id="department" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition">
                            <option value="">-- เลือกแผนก --</option>
                            <option value="HR">HR / Admin</option>
                            <option value="Accounting">บัญชี/การเงิน</option>
                            <option value="Sales">Sales / Marketing</option>
                            <option value="IT">IT / Dev</option>
                            <option value="Operations">Operations</option>
                            <option value="Management">Management</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-utensils text-green-600 mr-2"></i>เมนูอาหารที่ได้รับ <span class="text-xs text-red-500 font-normal ml-2">*เลือกหมวดละ 1 เมนู</span></h2>
                
                <div class="mb-5">
                    <label class="block text-sm font-medium text-amber-600 mb-2">แกง <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                        <label class="cursor-pointer"><input type="radio" name="menu_curry" value="แกงชะพลูปู" class="peer sr-only" required><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-amber-100 peer-checked:border-amber-500 peer-checked:text-amber-800 hover:bg-gray-50 transition">แกงชะพลูปู</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_curry" value="พะโล้โบราณ" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-amber-100 peer-checked:border-amber-500 peer-checked:text-amber-800 hover:bg-gray-50 transition">พะโล้โบราณ</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_curry" value="ต้มข่าไก่" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-amber-100 peer-checked:border-amber-500 peer-checked:text-amber-800 hover:bg-gray-50 transition">ต้มข่าไก่</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_curry" value="แกงส้มชะอมไข่กุ้ง" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-amber-100 peer-checked:border-amber-500 peer-checked:text-amber-800 hover:bg-gray-50 transition">แกงส้มชะอมไข่กุ้ง</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_curry" value="แกงจืดลูกรอก" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-amber-100 peer-checked:border-amber-500 peer-checked:text-amber-800 hover:bg-gray-50 transition">แกงจืดลูกรอก</div></label>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-medium text-orange-600 mb-2">ผัด <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                        <label class="cursor-pointer"><input type="radio" name="menu_stirfry" value="ใบเหลียงผัดไข่" class="peer sr-only" required><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-orange-100 peer-checked:border-orange-500 peer-checked:text-orange-800 hover:bg-gray-50 transition">ใบเหลียงผัดไข่</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_stirfry" value="พริกขิงปลาดุกฟู" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-orange-100 peer-checked:border-orange-500 peer-checked:text-orange-800 hover:bg-gray-50 transition">พริกขิงปลาดุกฟู</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_stirfry" value="หมูผัดเคย" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-orange-100 peer-checked:border-orange-500 peer-checked:text-orange-800 hover:bg-gray-50 transition">หมูผัดเคย</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_stirfry" value="พริกขิงหมูกรอบ" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-orange-100 peer-checked:border-orange-500 peer-checked:text-orange-800 hover:bg-gray-50 transition">พริกขิงหมูกรอบ</div></label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-yellow-700 mb-2">ข้าว <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                        <label class="cursor-pointer"><input type="radio" name="menu_rice" value="ข้าวผัดไข่" class="peer sr-only" required><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-yellow-100 peer-checked:border-yellow-500 peer-checked:text-yellow-800 hover:bg-gray-50 transition">ข้าวผัดไข่</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_rice" value="ข้าวสวย" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-yellow-100 peer-checked:border-yellow-500 peer-checked:text-yellow-800 hover:bg-gray-50 transition">ข้าวสวย</div></label>
                        <label class="cursor-pointer"><input type="radio" name="menu_rice" value="ข้าวเบอร์รี่" class="peer sr-only"><div class="p-2 text-sm text-center border rounded-lg peer-checked:bg-yellow-100 peer-checked:border-yellow-500 peer-checked:text-yellow-800 hover:bg-gray-50 transition">ข้าวเบอร์รี่</div></label>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2 class="text-lg font-semibold text-gray-800 mb-6 border-b pb-2"><i class="fas fa-star text-green-600 mr-2"></i>ความพึงพอใจ <span class="text-xs text-red-500 font-normal ml-2">*บังคับประเมินทุกข้อ</span></h2>
                
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div class="text-center">
                        <label class="block text-sm font-medium text-gray-700 mb-2">รสชาติอาหาร <span class="text-red-500">*</span></label>
                        <div class="flex justify-center gap-1 text-3xl text-gray-200" id="tasteContainer"></div>
                        <input type="hidden" id="tasteRating" value="0">
                    </div>
                    <div class="text-center">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Packaging <span class="text-red-500">*</span></label>
                        <div class="flex justify-center gap-1 text-3xl text-gray-200" id="pkgContainer"></div>
                        <input type="hidden" id="pkgRating" value="0">
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">ปริมาณอาหาร <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-3 gap-2">
                            <button type="button" onclick="selectChoice('portion', 'Little')" class="choice-btn portion-btn px-2 py-2 rounded-lg text-sm bg-gray-50">น้อยไป</button>
                            <button type="button" onclick="selectChoice('portion', 'Good')" class="choice-btn portion-btn px-2 py-2 rounded-lg text-sm bg-gray-50">กำลังดี</button>
                            <button type="button" onclick="selectChoice('portion', 'TooMuch')" class="choice-btn portion-btn px-2 py-2 rounded-lg text-sm bg-gray-50">เยอะไป</button>
                        </div>
                        <input type="hidden" id="portionVal">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">ความเผ็ด/รสชาติ <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-3 gap-2">
                            <button type="button" onclick="selectChoice('spicy', 'Bland')" class="choice-btn spicy-btn px-2 py-2 rounded-lg text-sm bg-gray-50">จืด/อ่อนไป</button>
                            <button type="button" onclick="selectChoice('spicy', 'Good')" class="choice-btn spicy-btn px-2 py-2 rounded-lg text-sm bg-gray-50">กลมกล่อม</button>
                            <button type="button" onclick="selectChoice('spicy', 'TooHot')" class="choice-btn spicy-btn px-2 py-2 rounded-lg text-sm bg-gray-50">เผ็ด/จัดเกิน</button>
                        </div>
                        <input type="hidden" id="spicyVal">
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-comment-dots text-green-600 mr-2"></i>ข้อเสนอแนะเพิ่มเติม</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">เมนูที่ประทับใจที่สุด (จากที่ทาน)</label>
                    <input type="text" id="favDish" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm bg-gray-50" placeholder="ระบุเมนูที่ชอบที่สุด...">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">หากต้องสั่งทานเอง จะเลือกสั่งร้านนี้ไหม? <span class="text-red-500">*</span></label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="repurchase" value="Yes" class="peer sr-only" required>
                            <div class="p-3 rounded-lg border border-gray-200 text-center text-sm text-gray-600 peer-checked:bg-green-600 peer-checked:text-white peer-checked:border-green-600 hover:bg-gray-50 transition">
                                <i class="fas fa-check mr-1"></i> สั่งแน่นอน
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="repurchase" value="Maybe" class="peer sr-only">
                            <div class="p-3 rounded-lg border border-gray-200 text-center text-sm text-gray-600 peer-checked:bg-gray-500 peer-checked:text-white peer-checked:border-gray-500 hover:bg-gray-50 transition">
                                <i class="fas fa-question mr-1"></i> ขอคิดดูก่อน
                            </div>
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">ข้อเสนอแนะอื่นๆ</label>
                    <textarea id="suggestion" rows="2" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm bg-gray-50" placeholder="พิมพ์ข้อเสนอแนะของคุณที่นี่..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">แนบรูปภาพอาหาร <span class="text-red-500">*บังคับ (เลือกได้มากกว่า 1 รูป)</span></label>
                    <div class="flex items-center justify-center w-full">
                        <label for="foodImage" class="flex flex-col items-center justify-center w-full h-24 border-2 border-green-300 border-dashed rounded-lg cursor-pointer bg-green-50 hover:bg-green-100 transition relative">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fas fa-cloud-upload-alt text-2xl text-green-600 mb-1"></i>
                                <p class="text-sm text-green-700 font-medium" id="uploadPlaceholderText">คลิกเพื่อเลือกรูปภาพ</p>
                            </div>
                            <input id="foodImage" type="file" class="hidden" accept="image/*" multiple onchange="previewImages(event)" />
                        </label>
                    </div>
                    <div id="imagePreviewContainer" class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-4"></div>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition duration-200 text-lg">
                <i class="fas fa-paper-plane mr-2"></i>ส่งผลประเมิน
            </button>
        </form>
    </div>

    <script>
        // --- เปลี่ยนเป็น URL Web App ล่าสุดของคุณ ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzh0Ghfz5HW2lH2_K1hrCH3DKZmi3fdYqAM6aVCv09js_XsXf-o03LDJkhXIUxIOSmAZw/exec';

        function initRating(containerId, inputId) {
            const container = document.getElementById(containerId);
            const input = document.getElementById(inputId);
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('i');
                star.className = 'fas fa-star rating-star text-gray-200';
                star.onclick = () => { input.value = i; updateStarVisuals(container, i); };
                container.appendChild(star);
            }
        }

        function updateStarVisuals(container, score) {
            const stars = container.children;
            for (let i = 0; i < stars.length; i++) {
                if (i < score) {
                    stars[i].classList.remove('text-gray-200');
                    stars[i].classList.add('active');
                } else {
                    stars[i].classList.add('text-gray-200');
                    stars[i].classList.remove('active');
                }
            }
        }

        window.selectChoice = function(groupType, value) {
            const inputId = groupType === 'portion' ? 'portionVal' : 'spicyVal';
            document.getElementById(inputId).value = value;
            const btnClass = groupType === 'portion' ? '.portion-btn' : '.spicy-btn';
            const buttons = document.querySelectorAll(btnClass);
            buttons.forEach(btn => btn.classList.remove('selected'));
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${value}'`)) btn.classList.add('selected');
            });
        };

        // --- ระบบ Preview รูปภาพหลายรูป ---
        function previewImages(event) {
            const container = document.getElementById('imagePreviewContainer');
            const files = event.target.files;
            container.innerHTML = ''; // เคลียร์รูปเก่าออก
            
            if (files.length > 0) {
                document.getElementById('uploadPlaceholderText').textContent = `เลือกแล้ว ${files.length} รูป (คลิกเพื่อเปลี่ยน)`;
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'w-full h-24 object-cover rounded-lg border border-gray-200 shadow-sm';
                        container.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            } else {
                document.getElementById('uploadPlaceholderText').textContent = 'คลิกเพื่อเลือกรูปภาพ';
            }
        }

        // ฟังก์ชันแปลงไฟล์เป็น Base64 ทั้งหมด (รองรับหลายไฟล์)
        async function getBase64Files(files) {
            const fileArray = Array.from(files);
            const promises = fileArray.map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve({
                        base64: reader.result.split(',')[1],
                        mimeType: file.type,
                        name: file.name
                    });
                    reader.onerror = error => reject(error);
                });
            });
            return Promise.all(promises);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initRating('tasteContainer', 'tasteRating');
            initRating('pkgContainer', 'pkgRating');
        });

        // --- SUBMIT FORM ---
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. ตรวจสอบว่าประเมินความพึงพอใจครบถ้วนหรือไม่
            if (document.getElementById('tasteRating').value == "0" || 
                document.getElementById('pkgRating').value == "0" ||
                document.getElementById('portionVal').value == "" || 
                document.getElementById('spicyVal').value == "") {
                Swal.fire({ icon: 'warning', title: 'ประเมินไม่ครบถ้วน', text: 'กรุณาให้คะแนนดาวและเลือกความพึงพอใจให้ครบทุกข้อครับ', confirmButtonColor: '#16a34a' });
                return;
            }

            // 2. ตรวจสอบว่ามีการแนบรูปอย่างน้อย 1 รูปหรือไม่
            const fileInput = document.getElementById('foodImage');
            if (fileInput.files.length === 0) {
                Swal.fire({ icon: 'warning', title: 'ลืมแนบรูปภาพ', text: 'กรุณาแนบรูปภาพอาหารอย่างน้อย 1 รูปครับ', confirmButtonColor: '#16a34a' });
                return;
            }

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', text: 'กำลังอัปโหลดรูปภาพ อาจใช้เวลาสักครู่', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // ดึงค่า Radio Button ของเมนูอาหาร
            const getRadioValue = (name) => document.querySelector(`input[name="${name}"]:checked`)?.value || '';

            try {
                // แปลงไฟล์ทั้งหมดเป็น Base64 Array
                const imagesData = await getBase64Files(fileInput.files);

                const formData = {
                    employee_name: document.getElementById('employeeName').value,
                    department: document.getElementById('department').value,
                    
                    menu_curry: getRadioValue('menu_curry'),
                    menu_stirfry: getRadioValue('menu_stirfry'),
                    menu_rice: getRadioValue('menu_rice'),

                    taste_rating: document.getElementById('tasteRating').value,
                    package_rating: document.getElementById('pkgRating').value,
                    portion_feedback: document.getElementById('portionVal').value,
                    spiciness_feedback: document.getElementById('spicyVal').value,
                    repurchase_intent: getRadioValue('repurchase'),
                    fav_dish: document.getElementById('favDish').value,
                    suggestion: document.getElementById('suggestion').value,

                    // ส่งชุดข้อมูลรูปภาพไปเป็น Array
                    images: imagesData
                };

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });

                Swal.fire({ icon: 'success', title: 'ขอบคุณครับ!', text: 'ส่งผลประเมินและอัปโหลดรูปภาพเรียบร้อยแล้ว', confirmButtonColor: '#16a34a' }).then(() => {
                    location.reload(); 
                });
            } catch (error) {
                console.error("Error:", error);
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง' });
            }
        });
    </script>
</body>
</html>
